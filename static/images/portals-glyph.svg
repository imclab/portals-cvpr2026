<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="portalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#portalGradient)" stroke-width="6"/>
  <!-- Inner portal -->
  <circle cx="50" cy="50" r="28" fill="url(#portalGradient)" opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="8" fill="url(#portalGradient)"/>
</svg>
